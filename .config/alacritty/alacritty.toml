live_config_reload = true

[font]
size = 15.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Medium"

[window]
decorations = "buttonless"
dynamic_padding = false
opacity = 0.7
blur = true
option_as_alt = "both"
startup_mode = "Maximized"

[window.padding]
x = 4
y = 0

[colors.primary]
background = "#232235"

[env]
  TERM = "xterm-256color"
