unbind r
bind r source-file ~/.tmux.conf

# act like vim
setw -g mode-keys vi
bind -r ^ last-window
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

#to open split in same directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

#To join panes
bind -r m select-pane -m # mark
bind -r M select-pane -M # unmark
bind -r j join-pane


# List of plugins
set -g @plugin 'christoomey/vim-tmux-navigator'

#Status bar
set -g status-left "#[fg=#BEADFA,bold]#S" # session name
set -g window-status-current-style "fg=#83A2FF"  # Replace '#your_color_here' with your desired color
set -g window-status-current-format "#W#[fg=#BEADFA]#F"
set -g window-status-format "#W#[fg=#BEADFA]#F"
set -g status-position top             # macOS / darwin style
set -g status-right ''                 # blank
set -g status-style 'bg=default'       # transparent

#Tmux options
set -s escape-time 0
set -g base-index 1          # start indexing windows at 1 instead of 0
set -g status-justify centre
bind-key x kill-pane         # skip "kill-pane 1? (y/n)" prompt
set -g renumber-windows on   # renumber all windows when any window is closed
set -g set-clipboard on      # use system clipboard
set -g status-position top
set-option -g focus-events on
set-option -g detach-on-destroy off

set -g status-right "#(tmux list-sessions | awk '{if ($1 != \"#{session_name}\") print \"[\" $1 \"]\"}' | tr '\n' ' ' | tr -d ':')"

# for tmux-sessionizer
bind-key -n '^f' run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"
bind-key -r '^ ' run-shell "tmux neww ~/.local/scripts/tmux-sessionizer ~/"
bind -r C-k display-popup -E "\
    tmux list-sessions -F '#{?session_attached,,#{session_name}}' |\
    sed '/^$/d' |\
    fzf --reverse --header jump-to-session --preview 'tmux capture-pane -pt {}'  |\
    xargs tmux switch-client -t"


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
